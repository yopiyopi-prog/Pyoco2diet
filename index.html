<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ピョコピョコ体重記録</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
:root{
  --purple:#7c5cbf;--purple-light:#a98de0;--purple-pale:#ede8f9;
  --green:#5bbf7c;--green-light:#8de0a9;
  --bg:#f4f0fc;--card:#fff;--ink:#2d2040;--muted:#9488b0;
  --shadow:rgba(124,92,191,0.13);--gold:#f5c842;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'M PLUS Rounded 1c',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;color:var(--ink);}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(124,92,191,0.07) 1.5px,transparent 1.5px);background-size:22px 22px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;padding-bottom:110px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--purple) 0%,var(--purple-light) 60%,var(--green-light) 100%);padding:16px 20px 32px;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:28px;background:var(--bg);border-radius:28px 28px 0 0;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.app-name{font-family:'Kaisei Decol',serif;font-size:12px;color:rgba(255,255,255,0.8);letter-spacing:0.12em;}
.streak-badge{background:rgba(255,255,255,0.22);border-radius:20px;padding:5px 12px;font-size:12px;color:#fff;font-weight:700;display:flex;align-items:center;gap:4px;}

/* RANK BAR */
.rank-bar{background:rgba(255,255,255,0.15);border-radius:12px;padding:8px 14px;margin-bottom:12px;}
.rank-bar-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.rank-label{font-size:10px;color:rgba(255,255,255,0.7);font-weight:700;}
.rank-name-h{font-size:15px;font-weight:800;color:#fff;flex:1;}
.rank-next{font-size:10px;color:rgba(255,255,255,0.65);font-weight:700;}
.rank-prog-wrap{height:5px;background:rgba(255,255,255,0.2);border-radius:10px;overflow:hidden;}
.rank-prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#fff6,#fff);transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);}

/* FROG */
.frog-area{display:flex;align-items:flex-end;gap:12px;}
.frog-wrap{flex-shrink:0;width:74px;height:74px;}
.frog-svg{width:74px;height:74px;animation:pyoko 1.8s ease-in-out infinite;transform-origin:bottom center;filter:drop-shadow(0 4px 8px rgba(91,191,124,0.4));}
.frog-svg.sad{animation:sad 2s ease-in-out infinite;}
.frog-svg.excited{animation:excited 0.5s ease-in-out infinite;}
@keyframes pyoko{0%,100%{transform:translateY(0) rotate(0deg);}25%{transform:translateY(-10px) rotate(-3deg);}50%{transform:translateY(-14px) rotate(2deg);}75%{transform:translateY(-5px) rotate(-1deg);}}
@keyframes sad{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-3px) rotate(2deg);}}
@keyframes excited{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-16px) scale(1.08);}}
.speech-bubble{background:#fff;border-radius:18px 18px 18px 4px;padding:11px 15px;flex:1;box-shadow:0 4px 16px var(--shadow);position:relative;margin-bottom:8px;}
.speech-bubble::before{content:'';position:absolute;left:-8px;bottom:14px;border:8px solid transparent;border-right-color:#fff;border-left:0;}
.speech-name{font-size:9px;color:var(--green);font-weight:800;letter-spacing:0.05em;margin-bottom:3px;}
.speech-text{font-size:13px;line-height:1.6;color:var(--ink);font-weight:700;}

/* TABS */
.tabs{display:flex;gap:5px;padding:14px 16px 10px;}
.tab{flex:1;padding:8px 2px;border-radius:13px;border:none;background:var(--card);color:var(--muted);font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px var(--shadow);transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab.active{background:linear-gradient(135deg,var(--purple),var(--purple-light));color:#fff;box-shadow:0 4px 12px rgba(124,92,191,0.35);transform:translateY(-2px);}
.tab-icon{font-size:16px;}

/* PANELS */
.panel{display:none;padding:0 16px;}.panel.active{display:block;}

/* CARD */
.card{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 4px 16px var(--shadow);margin-bottom:14px;}
.card-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:0.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.input-group{margin-bottom:13px;}
.input-label{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:6px;display:block;}
.input-field{width:100%;padding:12px 16px;border-radius:12px;border:2px solid var(--purple-pale);font-family:'M PLUS Rounded 1c',sans-serif;font-size:16px;font-weight:700;color:var(--ink);background:var(--bg);outline:none;transition:border-color 0.2s;}
.input-field:focus{border-color:var(--purple-light);}
.date-display{width:100%;padding:12px 16px;border-radius:12px;background:var(--purple-pale);font-size:15px;font-weight:700;color:var(--purple);text-align:center;}
.save-btn{width:100%;padding:15px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 #3d9e5a;transition:transform 0.1s,box-shadow 0.1s;letter-spacing:0.04em;}
.save-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #3d9e5a;}

/* GOAL CARD */
.goal-card{background:linear-gradient(135deg,#fff8e8,#fff);border:2px solid var(--gold);border-radius:20px;padding:18px;box-shadow:0 4px 16px rgba(245,200,66,0.18);margin-bottom:14px;}
.goal-row{display:flex;align-items:center;gap:10px;}
.goal-display{flex:1;font-size:22px;font-weight:800;color:var(--purple);}
.goal-display span{font-size:13px;color:var(--muted);font-weight:700;}
.goal-remaining{font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;white-space:nowrap;}
.goal-remaining.ok{background:#e8f9ee;color:var(--green);}
.goal-remaining.notyet{background:var(--purple-pale);color:var(--purple);}
.goal-remaining.achieved{background:linear-gradient(135deg,#ffd700,#ffec6e);color:#7a5000;}
.goal-progress-wrap{height:8px;background:#f0eaff;border-radius:10px;overflow:hidden;margin-top:10px;}
.goal-progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--purple),var(--purple-light));transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);}
.goal-edit-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}
.goal-input-row{display:flex;gap:8px;margin-top:10px;}
.goal-set-btn{padding:10px 18px;border-radius:12px;border:none;background:var(--gold);color:#7a5000;font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}

/* RECENT */
.latest-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--purple-pale);}
.latest-row:last-child{border-bottom:none;}
.latest-date{font-size:11px;color:var(--muted);font-weight:700;}
.latest-val{font-size:17px;font-weight:800;color:var(--purple);}
.latest-diff{font-size:11px;font-weight:700;}
.diff-up{color:#e05c7c;}.diff-down{color:var(--green);}.diff-same{color:var(--muted);}
.no-data{text-align:center;padding:30px 20px;color:var(--muted);font-weight:700;font-size:13px;line-height:1.8;}

/* RANK TIMELINE */
.rank-timeline{display:flex;flex-direction:column;}
.rank-step{display:flex;align-items:center;gap:12px;padding:9px 0;position:relative;}
.rank-step:not(:last-child)::after{content:'';position:absolute;left:19px;top:46px;width:2px;height:calc(100% - 12px);background:var(--purple-pale);}
.rank-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative;z-index:1;border:3px solid var(--purple-pale);background:#fff;}
.rank-dot.done{background:linear-gradient(135deg,var(--purple),var(--purple-light));border-color:var(--purple);font-size:14px;color:#fff;}
.rank-dot.current{background:linear-gradient(135deg,var(--green),var(--green-light));border-color:var(--green);box-shadow:0 0 0 4px rgba(91,191,124,0.25);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(91,191,124,0.25);}50%{box-shadow:0 0 0 8px rgba(91,191,124,0.1);}}
.rank-info{flex:1;}
.rank-title-t{font-size:14px;font-weight:800;color:var(--muted);}
.rank-title-t.done{color:var(--purple);}.rank-title-t.current{color:var(--green);}
.rank-days-t{font-size:10px;color:var(--muted);font-weight:700;margin-top:1px;}
.cur-tag{background:var(--green);color:#fff;border-radius:8px;padding:3px 8px;font-size:10px;font-weight:800;}

/* BADGE */
.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.badge-item{background:var(--card);border-radius:16px;padding:16px 10px;text-align:center;box-shadow:0 4px 12px var(--shadow);position:relative;}
.badge-item.locked{opacity:0.35;filter:grayscale(0.7);}
.badge-item.unlocked{border:2px solid var(--green-light);}
.badge-item.unlocked::after{content:'✓';position:absolute;top:7px;right:9px;font-size:10px;color:var(--green);font-weight:800;}
.badge-icon{font-size:34px;margin-bottom:6px;display:block;}
.badge-name{font-size:11px;font-weight:800;color:var(--ink);margin-bottom:2px;}
.badge-cond{font-size:10px;color:var(--muted);font-weight:700;}

/* TROPHY */
.section-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:0.08em;padding:0 4px 10px;}
.trophy-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.trophy-item{background:var(--card);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 12px var(--shadow);}
.trophy-item.locked{opacity:0.38;filter:grayscale(0.7);}
.trophy-item.unlocked{border-left:4px solid var(--gold);background:linear-gradient(to right,#fffbea,#fff);}
.trophy-icon{font-size:28px;flex-shrink:0;}
.trophy-info{flex:1;}
.trophy-name{font-size:13px;font-weight:800;color:var(--ink);}
.trophy-cond{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2);max-width:88vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* EDIT MODAL */
.edit-overlay{position:fixed;inset:0;background:rgba(44,20,80,0.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.edit-overlay.show{opacity:1;pointer-events:all;}
.edit-sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.edit-overlay.show .edit-sheet{transform:translateY(0);}
.edit-handle{width:36px;height:4px;background:#ddd;border-radius:4px;margin:0 auto 20px;}
.edit-title{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:16px;text-align:center;}
.edit-date-label{font-size:12px;font-weight:800;color:var(--muted);text-align:center;margin-bottom:14px;}
.edit-row{display:flex;gap:10px;margin-bottom:12px;}
.edit-del-btn{width:100%;padding:13px;border-radius:14px;border:2px solid #fde;background:#fff;color:#e05c7c;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;}
.edit-save-btn{flex:1;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--purple),var(--purple-light));color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
.edit-cancel-btn{padding:13px 18px;border-radius:14px;border:2px solid var(--purple-pale);background:#fff;color:var(--muted);font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}

/* LEVEL UP / ACHIEVEMENT OVERLAY */
.lu-overlay{position:fixed;inset:0;background:rgba(44,20,80,0.82);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.lu-overlay.show{opacity:1;pointer-events:all;}
.lu-box{background:#fff;border-radius:28px;padding:30px 36px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.35);animation:luPop 0.5s cubic-bezier(0.34,1.56,0.64,1);max-width:320px;width:90vw;}
@keyframes luPop{0%{transform:scale(0.5);}100%{transform:scale(1);}}
.lu-emoji{font-size:58px;display:block;margin-bottom:8px;}
.lu-label{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:0.1em;margin-bottom:6px;}
.lu-title{font-size:24px;font-weight:800;color:var(--purple);margin-bottom:4px;line-height:1.3;}
.lu-sub{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:18px;line-height:1.5;}
.lu-btn{padding:12px 32px;border-radius:50px;border:none;background:var(--purple);color:#fff;font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>
<div class="app">

<!-- OVERLAY -->
<div class="lu-overlay" id="luOverlay">
  <div class="lu-box">
    <span class="lu-emoji" id="luEmoji">🎊</span>
    <div class="lu-label" id="luLabel">✨ ご昇進、おめでとうございますぴょこ</div>
    <div class="lu-title" id="luTitle">正社員に昇進！</div>
    <div class="lu-sub" id="luSub">継続は力。わたくし、感服いたしましたぴょこ</div>
    <button class="lu-btn" onclick="document.getElementById('luOverlay').classList.remove('show')">ありがとうぴょこ✨</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="app-name">🐸 PYOKOPYOKO DIET</div>
    <div class="streak-badge">🔥<span id="streakNum">0</span>日連続</div>
  </div>
  <div class="rank-bar">
    <div class="rank-bar-top">
      <span class="rank-label">役職</span>
      <span class="rank-name-h" id="rankNameH">アルバイト</span>
      <span class="rank-next" id="rankNextH"></span>
    </div>
    <div class="rank-prog-wrap"><div class="rank-prog-fill" id="rankProgFill" style="width:0%"></div></div>
  </div>
  <div class="frog-area">
    <div class="frog-wrap">
      <svg class="frog-svg" id="frogSvg" viewBox="0 0 100 105" xmlns="http://www.w3.org/2000/svg"><g id="frogG"></g></svg>
    </div>
    <div class="speech-bubble">
      <div class="speech-name">カ・エルデ・ピョコピョコ</div>
      <div class="speech-text" id="frogSpeech">ぴょこ！今日も記録するぴょこ〜🌿</div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('record')"><span class="tab-icon">📝</span>記録</button>
  <button class="tab" onclick="switchTab('graph')"><span class="tab-icon">📈</span>グラフ</button>
  <button class="tab" onclick="switchTab('rank')"><span class="tab-icon">🏢</span>役職</button>
  <button class="tab" onclick="switchTab('badge')"><span class="tab-icon">🏆</span>実績</button>
</div>

<!-- RECORD PANEL -->
<div class="panel active" id="panel-record">

  <!-- GOAL CARD -->
  <div class="goal-card" id="goalCard">
    <div class="card-title" style="margin-bottom:10px;">🎯 目標体重</div>
    <div class="goal-row">
      <div class="goal-display" id="goalDisplay">未設定 <span>kg</span></div>
      <div class="goal-remaining" id="goalRemaining" style="display:none"></div>
      <button class="goal-edit-btn" id="goalEditBtn" onclick="toggleGoalEdit()" title="編集">✏️</button>
    </div>
    <div class="goal-progress-wrap" id="goalProgressWrap" style="display:none">
      <div class="goal-progress-fill" id="goalProgressFill" style="width:0%"></div>
    </div>
    <div class="goal-input-row" id="goalInputRow" style="display:none">
      <input class="input-field" type="number" id="goalInput" placeholder="例：52.0" step="0.1" min="20" max="300" style="font-size:15px;padding:10px 14px;">
      <button class="goal-set-btn" onclick="setGoal()">設定ぴょこ！</button>
    </div>
  </div>

  <!-- RECORD CARD -->
  <div class="card">
    <div class="card-title">📅 今日の記録</div>
    <div class="input-group"><span class="input-label">日付</span><div class="date-display" id="todayDate"></div></div>
    <div class="input-group"><span class="input-label">⚖️ 体重 (kg)</span><input class="input-field" type="number" id="weightInput" placeholder="例：55.0" step="0.1" min="20" max="300"></div>
    <div class="input-group"><span class="input-label">📝 メモ（任意）</span><input class="input-field" type="text" id="memoInput" placeholder="今日の調子など…"></div>
    <button class="save-btn" onclick="saveRecord()">ぴょこっと記録する！🐸</button>
  </div>

  <!-- RECENT -->
  <div class="card">
    <div class="card-title">📋 最近の記録</div>
    <div id="recentList"><div class="no-data">まだ記録がないぴょこ〜</div></div>
  </div>
</div>

<!-- GRAPH PANEL -->
<div class="panel" id="panel-graph">
  <div class="card">
    <div class="card-title">📈 体重グラフ（直近30日）</div>
    <div style="position:relative;width:100%;">
      <canvas id="weightChart"></canvas>
      <div class="no-data" id="graphNoData">記録が2件以上あると<br>グラフが出るぴょこ〜🌿</div>
    </div>
  </div>
  <div class="card" id="statsCard" style="display:none">
    <div class="card-title">📊 統計</div>
    <div id="statsContent"></div>
  </div>
</div>

<!-- RANK PANEL -->
<div class="panel" id="panel-rank">
  <div class="card">
    <div class="card-title">🏢 カ・エルデの出世ロード</div>
    <div class="rank-timeline" id="rankTimeline"></div>
  </div>
</div>

<!-- BADGE PANEL -->
<div class="panel" id="panel-badge">
  <div class="section-title">🥇 バッジ</div>
  <div class="badge-grid" id="badgeGrid"></div>
  <div class="section-title">🏆 トロフィー</div>
  <div class="trophy-list" id="trophyList"></div>
</div>

</div><!-- /app -->
<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="edit-overlay" id="editOverlay" onclick="closeEdit(event)">
  <div class="edit-sheet">
    <div class="edit-handle"></div>
    <div class="edit-title">✏️ 記録を修正するぴょこ</div>
    <div class="edit-date-label" id="editDateLabel"></div>
    <div class="input-group"><span class="input-label">⚖️ 体重 (kg)</span><input class="input-field" type="number" id="editWeightInput" step="0.1" min="20" max="300"></div>
    <div class="input-group"><span class="input-label">📝 メモ</span><input class="input-field" type="text" id="editMemoInput" placeholder="メモ（任意）"></div>
    <div class="edit-row">
      <button class="edit-cancel-btn" onclick="closeEdit()">キャンセル</button>
      <button class="edit-save-btn" onclick="saveEdit()">保存する！</button>
    </div>
    <button class="edit-del-btn" onclick="deleteRecord()">🗑️ この日の記録を削除する</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ======== RANKS ========
const RANKS=[
  {name:'アルバイト', days:0,   hat:'none',    col:'#7ce89a'},
  {name:'契約社員',  days:3,   hat:'cap',     col:'#5bbf7c'},
  {name:'正社員',    days:7,   hat:'tie',     col:'#4aaa6a'},
  {name:'主任',      days:14,  hat:'glasses', col:'#7c5cbf'},
  {name:'係長',      days:21,  hat:'badge',   col:'#6b4db0'},
  {name:'課長',      days:30,  hat:'crownS',  col:'#a98de0'},
  {name:'部長',      days:50,  hat:'crownM',  col:'#e0a020'},
  {name:'所長',      days:75,  hat:'crownG',  col:'#e08020'},
  {name:'常務',      days:100, hat:'topHat',  col:'#e05060'},
  {name:'専務',      days:150, hat:'diamond', col:'#c030a0'},
  {name:'超偉い人',  days:200, hat:'rainbow', col:'#ff6b6b'},
];

// ======== STREAK ========
function calcStreak(records){
  if(!records.length)return 0;
  const s=[...records].sort((a,b)=>b.date.localeCompare(a.date));
  const today=new Date().toISOString().slice(0,10);
  let n=0,cur=today;
  for(const r of s){if(r.date===cur){n++;const d=new Date(cur);d.setDate(d.getDate()-1);cur=d.toISOString().slice(0,10);}else if(r.date<cur)break;}
  return n;
}

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function getFrogSpeech(records){
  const streak=calcStreak(records);
  window._mood='normal';
  if(streak>=50)return SP.s50[0];
  if(streak>=30)return SP.s30[0];
  if(streak>=14)return SP.s14[0];
  if(streak>=7)return SP.s7[0];
  if(streak>=3)return SP.s3[0];
  if(!records.length)return pick(SP.none);
  // check goal proximity
  const goal=loadGoal();
  const sorted=[...records].sort((a,b)=>a.date.localeCompare(b.date));
  if(goal&&sorted.length){
    const cur=sorted[sorted.length-1].weight;
    if(cur>goal&&cur-goal<=1){window._mood='excited';return pick(SP.goal);}
  }
  if(sorted.length<2)return pick(SP.none);
  const diff=sorted[sorted.length-1].weight-sorted[sorted.length-2].weight;
  if(Math.abs(diff)<0.05)return pick(SP.same);
  if(diff<0){window._mood='excited';return pick(SP.down);}
  window._mood='sad';return pick(SP.up);
}

function toggleGoalEdit(){
  const row=document.getElementById('goalInputRow');

  if(!isOpen){const g=loadGoal();if(g)document.getElementById('goalInput').value=g;}

function setGoal(){
  const v=parseFloat(document.getElementById('goalInput').value);
  if(isNaN(v)||v<20||v>300){showToast('目標体重を正しく入力するぴょこ！');return;}
  saveGoal(v);
  document.getElementById('goalInputRow').style.display='none';
  renderGoal();
  showToast('目標設定したぴょこ〜！🎯');
}
function renderGoal(){
  const goal=loadGoal();
  const records=loadRecords();
  const sorted=[...records].sort((a,b)=>a.date.localeCompare(b.date));
  const cur=sorted.length?sorted[sorted.length-1].weight:null;
  const gd=document.getElementById('goalDisplay');
  const gr=document.getElementById('goalRemaining');
  const gpw=document.getElementById('goalProgressWrap');
  const gpf=document.getElementById('goalProgressFill');
  if(!goal){gd.innerHTML='未設定 <span>目標なし</span>';gr.style.display='none';gpw.style.display='none';return;}
  gd.innerHTML=`${goal} <span>kg</span>`;
  if(cur!==null){
    const diff=(cur-goal).toFixed(1);
    gr.style.display='block';
    if(cur<=goal){
      gr.textContent='🎉 達成！';gr.className='goal-remaining achieved';
    } else {
      gr.textContent=`あと ${diff}kg`;gr.className='goal-remaining notyet';
    }
    // progress: from start weight to goal
    const startRec=records.find(r=>r.date===(records.map(x=>x.date).sort()[0]));
    const startW=startRec?startRec.weight:cur;
    const total=startW-goal;
    const done=startW-cur;
    const pct=total>0?Math.min(100,Math.max(0,Math.round(done/total*100))):cur<=goal?100:0;
    gpw.style.display='block';
    gpf.style.width=pct+'%';
  } else {
    gr.style.display='none';gpw.style.display='none';
  }
}

// ======== EDIT ========
let _editDate=null;
function openEdit(date){
  const records=loadRecords();
  const r=records.find(x=>x.date===date);
  if(!r)return;
  _editDate=date;
  const d=new Date(date);
  document.getElementById('editDateLabel').textContent=`${date} (${['日','月','火','水','木','金','土'][d.getDay()]})`;
  document.getElementById('editWeightInput').value=r.weight;
  document.getElementById('editMemoInput').value=r.memo||'';
  document.getElementById('editOverlay').classList.add('show');
}
function closeEdit(e){
  if(e&&e.target!==document.getElementById('editOverlay'))return;
  document.getElementById('editOverlay').classList.remove('show');
  _editDate=null;
}
function saveEdit(){
  if(!_editDate)return;
  const w=parseFloat(document.getElementById('editWeightInput').value);
  if(isNaN(w)||w<20||w>300){showToast('体重を正しく入力するぴょこ！');return;}
  const memo=document.getElementById('editMemoInput').value.trim();
  const records=loadRecords();
  const idx=records.findIndex(r=>r.date===_editDate);
  if(idx>=0)records[idx]={date:_editDate,weight:w,memo};
  saveRecords(records);
  document.getElementById('editOverlay').classList.remove('show');
  _editDate=null;
  refreshAll();
  showToast('修正したぴょこ〜！✏️');
}
function deleteRecord(){
  if(!_editDate)return;
  if(!confirm(`${_editDate}の記録を削除するぴょこ？`))return;
  const records=loadRecords().filter(r=>r.date!==_editDate);
  saveRecords(records);
  document.getElementById('editOverlay').classList.remove('show');
  _editDate=null;
  refreshAll();
  showToast('削除したぴょこ〜🗑️');
}

// ======== RENDER RANK ========
function renderRank(streak){
  const cur=getRankIdx(streak);
  document.getElementById('rankTimeline').innerHTML=RANKS.map((r,i)=>{
    const st=i<cur?'done':i===cur?'current':'locked';
    const tag=i===cur?`<span class="cur-tag">いまここ</span>`:'';
    return`<div class="rank-step"><div class="rank-dot ${st}">${st==='done'?'✓':st==='current'?'🐸':'　'}</div>
    <div class="rank-info"><div class="rank-title-t ${st}">${r.name}</div><div class="rank-days-t">${i===0?'スタート！':r.days+'日連続達成'}</div></div>${tag}</div>`;
  }).join('');
}

// ======== RENDER BADGES & TROPHIES ========
function renderBadges(records){
  const goal=loadGoal();
  const sd=loadStartDate();
  document.getElementById('badgeGrid').innerHTML=BADGES.map(b=>{
    const ok=b.check(records);
    return`<div class="badge-item ${ok?'unlocked':'locked'}"><span class="badge-icon">${b.icon}</span><div class="badge-name">${b.name}</div><div class="badge-cond">${b.cond}</div></div>`;
  }).join('');
  document.getElementById('trophyList').innerHTML=TROPHIES.map(t=>{
    const ok=t.check(records,goal,sd);
    return`<div class="trophy-item ${ok?'unlocked':'locked'}">
      <span class="trophy-icon">${t.icon}</span>
      <div class="trophy-info"><div class="trophy-name">${t.name}</div><div class="trophy-cond">${t.cond}</div></div>
      ${ok?'<span style="font-size:16px;">✨</span>':''}
    </div>`;
  }).join('');
}

// ======== SAVE ========
let lastRankIdx=-1;
let prevTrophyCount=-1;
function saveRecord(){
  const w=parseFloat(document.getElementById('weightInput').value);
  if(isNaN(w)||w<20||w>300){showToast('体重を正しく入力するぴょこ！');return;}
  const records=loadRecords();
  const today=new Date().toISOString().slice(0,10);
  const memo=document.getElementById('memoInput').value.trim();
  // save start date on first record
  if(!records.length)saveStartDate(today);
  const ei=records.findIndex(r=>r.date===today);
  if(ei>=0)records[ei]={date:today,weight:w,memo};
  else records.push({date:today,weight:w,memo});
  saveRecords(records);
  document.getElementById('weightInput').value='';
  document.getElementById('memoInput').value='';
  const streak=calcStreak(records);
  const ni=getRankIdx(streak);
  // check rank up
  if(lastRankIdx>=0&&ni>lastRankIdx){
    const r=RANKS[ni];
    showOverlay('🎊🐸🎊','✨ ご昇進、おめでとうございますぴょこ',r.name+' に昇進！',`${r.days}日連続達成…わたくし、感動いたしましたぴょこ`);
  }
  lastRankIdx=ni;
  // check trophy
  const goal=loadGoal();const sd=loadStartDate();
  const newCount=TROPHIES.filter(t=>t.check(records,goal,sd)).length;
  if(prevTrophyCount>=0&&newCount>prevTrophyCount){
    const newTrophy=TROPHIES.filter(t=>t.check(records,goal,sd))[newCount-1];
    setTimeout(()=>showOverlay(newTrophy.icon,'🏆 トロフィーを賜りましたぴょこ',newTrophy.name,newTrophy.cond+'…誠におめでとうございますぴょこ✨'),1000);
  }
  prevTrophyCount=newCount;
  refreshAll();
  showToast('記録したぴょこ〜！🐸');
}

function showOverlay(emoji,label,title,sub){
  document.getElementById('luEmoji').textContent=emoji;
  document.getElementById('luLabel').textContent=label;
  document.getElementById('luTitle').textContent=title;
  document.getElementById('luSub').textContent=sub;
  document.getElementById('luOverlay').classList.add('show');
}

// ======== REFRESH ========
function refreshAll(){
  const records=loadRecords();
  const streak=calcStreak(records);
  window._mood='normal';
  document.getElementById('frogSpeech').textContent=getFrogSpeech(records);
  document.getElementById('streakNum').textContent=streak;
  const ri=getRankIdx(streak);const rk=RANKS[ri];
  document.getElementById('rankNameH').textContent=rk.name;
  document.getElementById('rankProgFill').style.width=getRankProg(streak)+'%';
  const nr=RANKS[ri+1];
  document.getElementById('rankNextH').textContent=nr?`次：${nr.name}(${nr.days}日)`:'最高位！👑';
  const fsv=document.getElementById('frogSvg');
  fsv.className='frog-svg'+(window._mood==='sad'?' sad':window._mood==='excited'?' excited':'');
  buildFrog(streak);
  renderGoal();
  renderRecent(records);
  renderRank(streak);
  renderBadges(records);
  if(document.getElementById('panel-graph').classList.contains('active'))renderChart(records);
}

function switchTab(name){
  const tabs=['record','graph','rank','badge'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='graph')renderChart(loadRecords());
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ======== INIT ========
const _t=new Date();
document.getElementById('todayDate').textContent=`${_t.getFullYear()}/${String(_t.getMonth()+1).padStart(2,'0')}/${String(_t.getDate()).padStart(2,'0')} (${['日','月','火','水','木','金','土'][_t.getDay()]})`;
lastRankIdx=getRankIdx(calcStreak(loadRecords()));
const _r=loadRecords();const _g=loadGoal();const _sd=loadStartDate();
prevTrophyCount=TROPHIES.filter(t=>t.check(_r,_g,_sd)).length;
refreshAll();
</script>
